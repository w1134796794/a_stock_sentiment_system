<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>服务已到期 · A股短线系统</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 grid place-items-center px-4">
  <section class="max-w-md w-full rounded-xl border border-amber-500/30 bg-slate-900/80 p-6 shadow-2xl">
    <div class="text-sm text-amber-300 mb-2">服务已到期</div>
    <h1 class="text-xl font-bold">当前账号暂时不能访问系统</h1>
    <p class="mt-3 text-sm text-slate-400 leading-6">
      账号 {{ user.username if user else '' }} 的服务有效期为
      <span class="text-slate-200">{{ user.expire_at_display if user else '--' }}</span>。
      续费后管理员启用账号即可恢复访问。
    </p>
    {% if error %}
    <div class="mt-3 rounded-lg border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-sm text-rose-200">{{ error }}</div>
    {% endif %}
    <div class="mt-5 flex gap-2">
      <a href="/logout" class="rounded-lg bg-emerald-600 hover:bg-emerald-500 px-4 py-2 text-sm font-semibold">切换账号</a>
      <a href="/login" class="rounded-lg border border-slate-700 hover:border-emerald-600 px-4 py-2 text-sm text-slate-300">返回登录</a>
    </div>
  </section>
</body>
</html>
