<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>{{ title or 'A股复盘' }} · 演出</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #34d399; --glow: 16,185,129; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden;
                 font-family: 'Noto Sans SC', system-ui, sans-serif; color: #f8fafc; }
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* 9:16 舞台：固定 1080x1920，靠 JS 等比缩放铺满视口（黑边信箱化） */
    #viewport { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
    #stage {
      position: relative; width: 1080px; height: 1920px; flex: 0 0 auto;
      transform-origin: center center; overflow: hidden;
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(var(--glow), .28), transparent 60%),
        radial-gradient(90% 60% at 50% 115%, rgba(var(--glow), .18), transparent 55%),
        linear-gradient(180deg, #0b1220 0%, #060912 60%, #05070d 100%);
      box-shadow: 0 0 120px rgba(0,0,0,.6); }
    #stage::after { content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(140% 100% at 50% 50%, transparent 60%, rgba(0,0,0,.45) 100%); }

    .safe { position: absolute; inset: 0; padding: 150px 90px 230px; display: flex; flex-direction: column; }

    /* 顶部：分段进度条 + 日期/周期胶囊 */
    .topbar { position: absolute; top: 64px; left: 90px; right: 90px; }
    .segs { display: flex; gap: 10px; }
    .seg { flex: 1; height: 8px; border-radius: 99px; background: rgba(255,255,255,.16); overflow: hidden; }
    .seg > i { display: block; height: 100%; width: 0; background: var(--accent); border-radius: 99px; }
    .chips { margin-top: 26px; display: flex; align-items: center; gap: 16px; }
    .chip { font-size: 28px; font-weight: 700; padding: 8px 22px; border-radius: 99px;
            background: rgba(var(--glow), .16); color: var(--accent); border: 2px solid rgba(var(--glow), .35); }
    .chip.ghost { background: rgba(255,255,255,.06); color: #cbd5e1; border-color: rgba(255,255,255,.12); }

    /* 场景内容区 */
    .scene { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }
    .scene.center { align-items: center; text-align: center; }
    .eyebrow { font-size: 30px; font-weight: 700; letter-spacing: .12em; color: var(--accent); margin-bottom: 18px; }
    .title { font-size: 86px; line-height: 1.12; font-weight: 900; letter-spacing: -.01em; }
    .title.hook { font-size: 100px; }
    .subtitle { margin-top: 22px; font-size: 38px; font-weight: 500; color: #cbd5e1; }

    /* 数字卡片网格 */
    .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-top: 56px; }
    .stats.cols-1 { grid-template-columns: 1fr; }
    .stats.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .stat { background: rgba(255,255,255,.05); border: 2px solid rgba(255,255,255,.08); border-radius: 32px;
            padding: 38px 34px; }
    .stat-val { font-size: 92px; font-weight: 900; line-height: 1; letter-spacing: -.02em; }
    .stat-val .u { font-size: 40px; font-weight: 700; margin-left: 10px; opacity: .85; }
    .stat-label { margin-top: 16px; font-size: 34px; color: #94a3b8; font-weight: 600; }

    /* 榜单 */
    .list { margin-top: 48px; display: flex; flex-direction: column; gap: 22px; }
    .row { display: flex; align-items: center; gap: 28px; background: rgba(255,255,255,.045);
           border: 2px solid rgba(255,255,255,.07); border-radius: 28px; padding: 28px 34px; }
    .rank { flex: 0 0 78px; height: 78px; border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 44px; font-weight: 900; background: rgba(255,255,255,.08); color: #e2e8f0; }
    .row.top .rank { background: var(--accent); color: #07120c; }
    .row-main { flex: 1; min-width: 0; }
    .row-name { font-size: 48px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-code { font-size: 28px; color: #64748b; margin-left: 14px; font-weight: 600; }
    .row-sub { margin-top: 8px; font-size: 30px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-val { flex: 0 0 auto; text-align: right; font-size: 64px; font-weight: 900; }
    .row-val .u { font-size: 30px; font-weight: 700; margin-left: 8px; opacity: .8; }

    /* 大段口播/免责（hook/cta/补充） */
    .lede { margin-top: 40px; font-size: 44px; line-height: 1.5; font-weight: 600; color: #e2e8f0; }
    .fine { margin-top: 36px; font-size: 28px; line-height: 1.6; color: #64748b; max-width: 760px; }

    /* 底部字幕条 */
    .subband { position: absolute; left: 0; right: 0; bottom: 0; padding: 0 90px 70px; }
    .subband .cap { display: inline-block; max-width: 100%; font-size: 40px; font-weight: 700; line-height: 1.4;
                    padding: 20px 34px; border-radius: 24px; background: rgba(0,0,0,.55);
                    backdrop-filter: blur(6px); border: 2px solid rgba(255,255,255,.08); }
    .brand { position: absolute; top: 70px; right: 96px; font-size: 26px; font-weight: 800; color: rgba(255,255,255,.5); }

    /* 入场动画 */
    .anim { opacity: 0; transform: translateY(36px); }
    .scene.in .anim { opacity: 1; transform: none; transition: opacity .5s ease, transform .5s cubic-bezier(.2,.7,.2,1); }
    .scene.in .anim:nth-child(2){ transition-delay:.06s } .scene.in .anim:nth-child(3){ transition-delay:.12s }
    .scene.in .anim:nth-child(4){ transition-delay:.18s } .scene.in .anim:nth-child(5){ transition-delay:.24s }
    .scene.in .stat, .scene.in .row { opacity: 1 !important; }
    .stats .stat, .list .row { opacity: 0; transform: translateY(28px); }
    .scene.in .stats .stat, .scene.in .list .row { opacity: 1; transform: none;
            transition: opacity .45s ease, transform .45s cubic-bezier(.2,.7,.2,1); }
    .scene.in .stats .stat:nth-child(2){transition-delay:.07s} .scene.in .stats .stat:nth-child(3){transition-delay:.14s}
    .scene.in .stats .stat:nth-child(4){transition-delay:.21s} .scene.in .stats .stat:nth-child(5){transition-delay:.28s}
    .scene.in .list .row:nth-child(2){transition-delay:.08s} .scene.in .list .row:nth-child(3){transition-delay:.16s}
    .scene.in .list .row:nth-child(4){transition-delay:.24s} .scene.in .list .row:nth-child(5){transition-delay:.32s}

    /* 播放控制条（单场景/截帧模式隐藏） */
    #ctrl { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%);
            display: flex; align-items: center; gap: 14px; padding: 12px 18px; border-radius: 99px;
            background: rgba(15,23,42,.85); border: 1px solid rgba(255,255,255,.12); backdrop-filter: blur(8px);
            opacity: 0; transition: opacity .3s; z-index: 50; }
    #viewport:hover ~ #ctrl, #ctrl:hover { opacity: 1; }
    #ctrl button { width: 44px; height: 44px; border-radius: 50%; border: none; cursor: pointer;
                   background: rgba(255,255,255,.08); color: #e2e8f0; font-size: 18px; display:flex; align-items:center; justify-content:center; }
    #ctrl button:hover { background: var(--accent); color: #07120c; }
    #ctrl button.spd { width: auto; min-width: 52px; padding: 0 14px; border-radius: 22px; font-size: 16px; font-weight: 800; }
    #ctrl .dots { display: flex; gap: 7px; padding: 0 8px; }
    #ctrl .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.25); cursor: pointer; }
    #ctrl .dot.on { background: var(--accent); }
    #ctrl .tt { font-size: 13px; color: #94a3b8; min-width: 86px; text-align: center; }
    .loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 20px; }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="stage">
      <div class="brand" id="brand">每日收盘复盘</div>
      <div class="topbar"><div class="segs" id="segs"></div>
        <div class="chips"><span class="chip" id="cycleChip">--</span><span class="chip ghost" id="dateChip">--</span></div>
      </div>
      <div class="safe"><div class="scene" id="scene"></div></div>
      <div class="subband"><span class="cap" id="cap"></span></div>
    </div>
  </div>
  <div id="ctrl">
    <button id="prev" title="上一幕 (←)">⏮</button>
    <button id="play" title="播放/暂停 (空格)">⏸</button>
    <button id="next" title="下一幕 (→)">⏭</button>
    <div class="dots" id="dots"></div>
    <span class="tt mono" id="tt">0 / 0</span>
    <button id="speed" class="spd mono" title="播放倍速 (S)">1×</button>
    <button id="cards" title="图文导出（发小红书）">图</button>
    <button id="full" title="全屏 (F)">⛶</button>
  </div>
  <div class="loading" id="loading">正在加载分镜…</div>

  <script>
    const DATE = {{ date|tojson }};
    const SINGLE = {{ single|tojson }};      // 单场景 key（截帧/预览），否则 null
    const AUTOPLAY = {{ autoplay|tojson }};  // 是否自动播放

    const ACCENTS = {
      rose:    { c: '#fb7185', glow: '244,63,94'   },
      emerald: { c: '#34d399', glow: '16,185,129'  },
      sky:     { c: '#38bdf8', glow: '14,165,233'  },
      amber:   { c: '#fbbf24', glow: '245,158,11'  },
      slate:   { c: '#a8b3c4', glow: '100,116,139' },
    };
    // 涨跌语义色（A股惯例：红涨绿跌）
    const TONE = { up: '#ff5d5d', down: '#3ddc97', neutral: '#e8edf5' };

    const $ = (s, r = document) => r.querySelector(s);
    const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    const fmtNum = (v) => (typeof v === 'number' && isFinite(v)) ? v.toLocaleString('en-US') : esc(v);

    let DATA = null, scenes = [], idx = 0, playing = false, elapsed = 0, lastTick = 0, raf = 0, single = false;
    const SPEEDS = [1, 1.5, 2, 3];
    let speed = 1;

    function applyAccent(name) {
      const a = ACCENTS[name] || ACCENTS.emerald;
      document.documentElement.style.setProperty('--accent', a.c);
      document.documentElement.style.setProperty('--glow', a.glow);
    }

    function fitStage() {
      const stage = $('#stage'), vw = window.innerWidth, vh = window.innerHeight;
      const s = Math.min(vw / 1080, vh / 1920);
      stage.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', fitStage);

    function statGrid(stats) {
      const wrap = el('div', 'stats anim' + (stats.length === 3 ? ' cols-3' : (stats.length === 1 ? ' cols-1' : '')));
      stats.forEach(s => {
        const card = el('div', 'stat');
        const color = TONE[s.tone] || TONE.neutral;
        const u = s.unit ? `<span class="u">${esc(s.unit)}</span>` : '';
        card.appendChild(el('div', 'stat-val mono', `<span style="color:${color}">${fmtNum(s.value)}</span>${u}`));
        card.appendChild(el('div', 'stat-label', esc(s.label)));
        wrap.appendChild(card);
      });
      return wrap;
    }

    function listView(items) {
      const wrap = el('div', 'list anim');
      items.forEach((it, i) => {
        const row = el('div', 'row' + (i === 0 ? ' top' : ''));
        row.appendChild(el('div', 'rank mono', esc(it.rank != null ? it.rank : i + 1)));
        const main = el('div', 'row-main');
        const code = it.code ? `<span class="row-code mono">${esc(it.code)}</span>` : '';
        main.appendChild(el('div', 'row-name', `${esc(it.name)}${code}`));
        if (it.sub) main.appendChild(el('div', 'row-sub', esc(it.sub)));
        row.appendChild(main);
        if (it.value != null && it.value !== '') {
          const color = TONE[it.tone] || TONE.neutral;
          const u = it.unit ? `<span class="u">${esc(it.unit)}</span>` : '';
          row.appendChild(el('div', 'row-val mono', `<span style="color:${color}">${fmtNum(it.value)}</span>${u}`));
        }
        wrap.appendChild(row);
      });
      return wrap;
    }

    function renderScene(i) {
      const sc = scenes[i];
      if (!sc) return;
      applyAccent(sc.accent || DATA.accent);
      const host = $('#scene');
      host.className = 'scene';
      host.innerHTML = '';

      const hasStats = (sc.stats || []).length, hasList = (sc.list || []).length;
      const centered = sc.key === 'hook' || sc.key === 'cta' || (!hasStats && !hasList);
      if (centered) host.classList.add('center');

      if (sc.subtitle && sc.key !== 'hook') host.appendChild(el('div', 'eyebrow anim', esc(sc.subtitle)));
      host.appendChild(el('div', 'title anim' + (sc.key === 'hook' ? ' hook' : ''), esc(sc.title)));
      if (sc.key === 'hook' && sc.subtitle) host.appendChild(el('div', 'subtitle anim', esc(sc.subtitle)));

      if (hasStats) host.appendChild(statGrid(sc.stats));
      if (hasList) host.appendChild(listView(sc.list));

      if (centered && sc.narration && sc.key !== 'cta') host.appendChild(el('div', 'lede anim', esc(sc.narration)));
      if (sc.key === 'cta') host.appendChild(el('div', 'fine anim', esc(DATA.disclaimer || sc.caption)));

      $('#cap').textContent = sc.caption || '';
      $('#cap').style.display = sc.caption ? '' : 'none';
      $('#dateChip').textContent = (DATA.date || '').replace(/^(\d{4})(\d{2})(\d{2})$/, '$1-$2-$3');
      $('#cycleChip').textContent = DATA.cycle || 'A股';

      // 进度分段高亮
      document.querySelectorAll('#segs .seg > i').forEach((bar, k) => {
        bar.style.transition = 'none';
        bar.style.width = k < i ? '100%' : '0%';
      });
      document.querySelectorAll('#dots .dot').forEach((d, k) => d.classList.toggle('on', k === i));
      $('#tt').textContent = `${i + 1} / ${scenes.length}`;

      void host.offsetWidth;            // 触发重排，确保入场动画
      host.classList.add('in');
    }

    function go(i) {
      idx = Math.max(0, Math.min(scenes.length - 1, i));
      elapsed = 0; lastTick = performance.now();
      renderScene(idx);
    }
    const next = () => { if (idx < scenes.length - 1) go(idx + 1); else { pause(); } };
    const prev = () => go(idx - 1);

    function tick(now) {
      if (!playing) return;
      const sc = scenes[idx];
      elapsed += (now - lastTick) * speed; lastTick = now;
      const dur = (sc.duration || 5) * 1000;
      const bar = document.querySelector(`#segs .seg:nth-child(${idx + 1}) > i`);
      if (bar) { bar.style.transition = 'width .1s linear'; bar.style.width = Math.min(100, elapsed / dur * 100) + '%'; }
      if (elapsed >= dur) {
        if (idx < scenes.length - 1) go(idx + 1); else { pause(); return; }
      }
      raf = requestAnimationFrame(tick);
    }
    function play() { if (playing || single) return; playing = true; $('#play').textContent = '⏸';
      lastTick = performance.now(); raf = requestAnimationFrame(tick); }
    function pause() { playing = false; $('#play').textContent = '▶'; cancelAnimationFrame(raf); }
    const toggle = () => playing ? pause() : play();

    function buildChrome() {
      const segs = $('#segs'); segs.innerHTML = '';
      const dots = $('#dots'); dots.innerHTML = '';
      scenes.forEach((_, k) => {
        const seg = el('div', 'seg'); seg.appendChild(el('i')); segs.appendChild(seg);
        const dot = el('div', 'dot'); dot.onclick = () => { pause(); go(k); }; dots.appendChild(dot);
      });
    }

    function startSingle(key) {
      single = true;
      $('#ctrl').style.display = 'none';
      $('#segs').parentElement.style.display = 'none';   // 隐藏进度/胶囊，干净截帧
      $('#brand').style.display = 'none';
      const i = Math.max(0, scenes.findIndex(s => s.key === key));
      renderScene(i);
    }

    async function boot() {
      try {
        const url = DATE ? `/api/recap/${DATE}` : '/api/recap';
        const r = await fetch(url);
        DATA = await r.json();
        if (!DATA || DATA.error || !(DATA.scenes || []).length) throw new Error('no recap');
      } catch (e) {
        $('#loading').textContent = '暂无该日复盘分镜，请先在「生成数据」生成快照后重试。';
        return;
      }
      $('#loading').style.display = 'none';
      scenes = DATA.scenes;
      applyAccent(DATA.accent);
      buildChrome();
      fitStage();
      document.title = `${DATA.title || 'A股复盘'} · 演出`;

      if (SINGLE) { startSingle(SINGLE); return; }
      go(0);
      if (AUTOPLAY) play();
    }

    // 控制
    const cycleSpeed = () => { speed = SPEEDS[(SPEEDS.indexOf(speed) + 1) % SPEEDS.length]; $('#speed').textContent = speed + '×'; };
    $('#play').onclick = toggle; $('#next').onclick = () => { pause(); next(); };
    $('#prev').onclick = () => { pause(); prev(); };
    $('#speed').onclick = cycleSpeed;
    $('#cards').onclick = () => { location.href = (DATE ? `/recap/${DATE}/cards?mode=full` : '/recap'); };
    $('#full').onclick = () => { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); };
    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); toggle(); }
      else if (e.code === 'ArrowRight') { pause(); next(); }
      else if (e.code === 'ArrowLeft') { pause(); prev(); }
      else if (e.key === 'r' || e.key === 'R') { go(0); play(); }
      else if (e.key === 's' || e.key === 'S') cycleSpeed();
      else if (e.key === 'f' || e.key === 'F') $('#full').click();
    });

    boot();
  </script>
</body>
</html>
