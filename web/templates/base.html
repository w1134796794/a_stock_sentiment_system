<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}明日计划看板{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { height: 8px; width: 8px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    .card { background: linear-gradient(180deg, rgba(30,41,59,.7), rgba(15,23,42,.7)); }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <header class="sticky top-0 z-20 border-b border-slate-800 bg-slate-950/85 backdrop-blur">
    <div class="max-w-7xl mx-auto px-5 py-3 flex items-center gap-4">
      <a href="/" class="flex items-center gap-2 shrink-0">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-400"></span>
        <span class="font-bold tracking-tight">A股情绪 · 明日计划</span>
      </a>
      <a href="/config" class="text-sm text-slate-400 hover:text-emerald-300 shrink-0">参数配置</a>
      <div class="flex-1"></div>
      {% block header_extra %}{% endblock %}
    </div>
  </header>
  <main class="max-w-7xl mx-auto px-5 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
