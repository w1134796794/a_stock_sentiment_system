<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or 'A股复盘' }} · 图文</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root { --accent: #34d399; --glow: 16,185,129; }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #0a0e17;
                 font-family: 'Noto Sans SC', system-ui, sans-serif; color: #f8fafc; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    a { color: inherit; }

    /* 顶部工具条 */
    .bar { position: sticky; top: 0; z-index: 20; display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
           padding: 16px 24px; background: rgba(10,14,23,.92); border-bottom: 1px solid rgba(255,255,255,.08);
           backdrop-filter: blur(8px); }
    .bar h1 { font-size: 18px; font-weight: 800; margin: 0; }
    .bar .sub { font-size: 13px; color: #94a3b8; }
    .bar .spacer { flex: 1; }
    .btn { border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06); color: #e2e8f0;
           font-size: 14px; font-weight: 700; padding: 9px 16px; border-radius: 10px; cursor: pointer; text-decoration: none; }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { background: #34d399; color: #07120c; border-color: #34d399; }
    .btn.primary:hover { filter: brightness(1.08); color: #07120c; }
    .hint { padding: 12px 24px; font-size: 13px; color: #64748b; }

    /* 卡片画廊：每幕一张，等比缩放显示，原生 1080x1920 下载 */
    .gallery { display: flex; flex-wrap: wrap; gap: 26px; padding: 24px; align-items: flex-start; }
    .card { display: flex; flex-direction: column; gap: 10px; }
    .frame { width: 300px; height: 533px; overflow: hidden; border-radius: 18px;
             border: 1px solid rgba(255,255,255,.1); box-shadow: 0 12px 40px rgba(0,0,0,.5); }
    .card .meta { display: flex; align-items: center; gap: 10px; }
    .card .meta .ix { font-size: 13px; font-weight: 800; color: #94a3b8; }
    .card .meta .nm { font-size: 13px; color: #cbd5e1; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card .meta .dl { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 8px; cursor: pointer;
                      border: 1px solid rgba(255,255,255,.15); background: rgba(255,255,255,.06); color: #e2e8f0; }
    .card .meta .dl:hover { border-color: var(--accent); color: var(--accent); }
    .loading { padding: 60px 24px; color: #64748b; font-size: 16px; }
    #busy { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 60;
            background: rgba(5,7,13,.7); font-size: 18px; font-weight: 700; }

    /* ================= 9:16 舞台样式（与演出视图一致，去掉 backdrop-filter 以便 html2canvas 截图） ================= */
    .stage {
      position: relative; width: 1080px; height: 1920px;
      transform: scale(.27778); transform-origin: top left;
      overflow: hidden; color: #f8fafc;
      background:
        radial-gradient(120% 80% at 50% -10%, rgba(var(--glow), .28), transparent 60%),
        radial-gradient(90% 60% at 50% 115%, rgba(var(--glow), .18), transparent 55%),
        linear-gradient(180deg, #0b1220 0%, #060912 60%, #05070d 100%); }
    .stage::after { content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(140% 100% at 50% 50%, transparent 60%, rgba(0,0,0,.45) 100%); }
    .stage .safe { position: absolute; inset: 0; padding: 150px 90px 230px; display: flex; flex-direction: column; }
    .stage .chips { position: absolute; top: 64px; left: 90px; display: flex; align-items: center; gap: 16px; }
    .stage .chip { font-size: 28px; font-weight: 700; padding: 8px 22px; border-radius: 99px;
            background: rgba(var(--glow), .16); color: var(--accent); border: 2px solid rgba(var(--glow), .35); }
    .stage .chip.ghost { background: rgba(255,255,255,.06); color: #cbd5e1; border-color: rgba(255,255,255,.12); }
    .stage .brand { position: absolute; top: 70px; right: 96px; font-size: 26px; font-weight: 800; color: rgba(255,255,255,.5); }

    .stage .scene { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }
    .stage .scene.center { align-items: center; text-align: center; }
    .stage .eyebrow { font-size: 30px; font-weight: 700; letter-spacing: .12em; color: var(--accent); margin-bottom: 18px; }
    .stage .title { font-size: 86px; line-height: 1.12; font-weight: 900; letter-spacing: -.01em; }
    .stage .title.hook { font-size: 100px; }
    .stage .subtitle { margin-top: 22px; font-size: 38px; font-weight: 500; color: #cbd5e1; }

    .stage .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; margin-top: 56px; }
    .stage .stats.cols-1 { grid-template-columns: 1fr; }
    .stage .stats.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .stage .stat { background: rgba(255,255,255,.05); border: 2px solid rgba(255,255,255,.08); border-radius: 32px; padding: 38px 34px; }
    .stage .stat-val { font-size: 92px; font-weight: 900; line-height: 1; letter-spacing: -.02em; }
    .stage .stat-val .u { font-size: 40px; font-weight: 700; margin-left: 10px; opacity: .85; }
    .stage .stat-label { margin-top: 16px; font-size: 34px; color: #94a3b8; font-weight: 600; }

    .stage .list { margin-top: 48px; display: flex; flex-direction: column; gap: 22px; }
    .stage .row { display: flex; align-items: center; gap: 28px; background: rgba(255,255,255,.045);
           border: 2px solid rgba(255,255,255,.07); border-radius: 28px; padding: 28px 34px; }
    .stage .rank { flex: 0 0 78px; height: 78px; border-radius: 22px; display: flex; align-items: center; justify-content: center;
            font-size: 44px; font-weight: 900; background: rgba(255,255,255,.08); color: #e2e8f0; }
    .stage .row.top .rank { background: var(--accent); color: #07120c; }
    .stage .row-main { flex: 1; min-width: 0; }
    .stage .row-name { font-size: 48px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stage .row-code { font-size: 28px; color: #64748b; margin-left: 14px; font-weight: 600; }
    .stage .row-sub { margin-top: 8px; font-size: 30px; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stage .row-val { flex: 0 0 auto; text-align: right; font-size: 64px; font-weight: 900; }
    .stage .row-val .u { font-size: 30px; font-weight: 700; margin-left: 8px; opacity: .8; }

    .stage .lede { margin-top: 40px; font-size: 44px; line-height: 1.5; font-weight: 600; color: #e2e8f0; }
    .stage .fine { margin-top: 36px; font-size: 28px; line-height: 1.6; color: #64748b; max-width: 760px; }
    .stage .subband { position: absolute; left: 0; right: 0; bottom: 0; padding: 0 90px 70px; }
    .stage .cap { display: inline-block; max-width: 100%; font-size: 40px; font-weight: 700; line-height: 1.4;
                  padding: 20px 34px; border-radius: 24px; background: rgba(0,0,0,.55); border: 2px solid rgba(255,255,255,.08); }
  </style>
</head>
<body>
  <div class="bar">
    <div>
      <h1 id="ttl">A股复盘 · 图文</h1>
      <div class="sub" id="sub">逐幕成图，可直接发小红书图文 · 单张 1080×1920</div>
    </div>
    <div class="spacer"></div>
    <a class="btn" id="playLink" href="#">▶ 看演出</a>
    <button class="btn primary" id="dlAll">⬇ 下载全部 PNG</button>
  </div>
  <div class="hint">提示：每张图为 1080×1920 竖图，点「下载全部」会按顺序保存所有卡片；小红书图文最多 18 张，按需挑选即可。</div>
  <div class="gallery" id="gallery"></div>
  <div class="loading" id="loading">正在加载分镜…</div>
  <div id="busy">正在生成图片…</div>

  <script>
    const DATE = {{ date|tojson }};
    const ACCENTS = {
      rose:    { c: '#fb7185', glow: '244,63,94'   },
      emerald: { c: '#34d399', glow: '16,185,129'  },
      sky:     { c: '#38bdf8', glow: '14,165,233'  },
      amber:   { c: '#fbbf24', glow: '245,158,11'  },
      slate:   { c: '#a8b3c4', glow: '100,116,139' },
    };
    const TONE = { up: '#ff5d5d', down: '#3ddc97', neutral: '#e8edf5' };

    const $ = (s, r = document) => r.querySelector(s);
    const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    const fmtNum = (v) => (typeof v === 'number' && isFinite(v)) ? v.toLocaleString('en-US') : esc(v);
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    let DATA = null, scenes = [];

    function statGrid(stats) {
      const wrap = el('div', 'stats' + (stats.length === 3 ? ' cols-3' : (stats.length === 1 ? ' cols-1' : '')));
      stats.forEach(s => {
        const card = el('div', 'stat');
        const color = TONE[s.tone] || TONE.neutral;
        const u = s.unit ? `<span class="u">${esc(s.unit)}</span>` : '';
        card.appendChild(el('div', 'stat-val mono', `<span style="color:${color}">${fmtNum(s.value)}</span>${u}`));
        card.appendChild(el('div', 'stat-label', esc(s.label)));
        wrap.appendChild(card);
      });
      return wrap;
    }

    function listView(items) {
      const wrap = el('div', 'list');
      items.forEach((it, i) => {
        const row = el('div', 'row' + (i === 0 ? ' top' : ''));
        row.appendChild(el('div', 'rank mono', esc(it.rank != null ? it.rank : i + 1)));
        const main = el('div', 'row-main');
        const code = it.code ? `<span class="row-code mono">${esc(it.code)}</span>` : '';
        main.appendChild(el('div', 'row-name', `${esc(it.name)}${code}`));
        if (it.sub) main.appendChild(el('div', 'row-sub', esc(it.sub)));
        row.appendChild(main);
        if (it.value != null && it.value !== '') {
          const color = TONE[it.tone] || TONE.neutral;
          const u = it.unit ? `<span class="u">${esc(it.unit)}</span>` : '';
          row.appendChild(el('div', 'row-val mono', `<span style="color:${color}">${fmtNum(it.value)}</span>${u}`));
        }
        wrap.appendChild(row);
      });
      return wrap;
    }

    // 构建单幕舞台（1080x1920），静态展示，无动画
    function buildStage(sc, i) {
      const a = ACCENTS[sc.accent || DATA.accent] || ACCENTS.emerald;
      const stage = el('div', 'stage');
      stage.id = 'stage-' + i;
      stage.style.setProperty('--accent', a.c);
      stage.style.setProperty('--glow', a.glow);

      stage.appendChild(el('div', 'brand', '每日收盘复盘'));
      const chips = el('div', 'chips');
      chips.appendChild(el('span', 'chip', esc(DATA.cycle || 'A股')));
      chips.appendChild(el('span', 'chip ghost', esc((DATA.date || '').replace(/^(\d{4})(\d{2})(\d{2})$/, '$1-$2-$3'))));
      stage.appendChild(chips);

      const safe = el('div', 'safe');
      const host = el('div', 'scene');
      const hasStats = (sc.stats || []).length, hasList = (sc.list || []).length;
      const centered = sc.key === 'hook' || sc.key === 'cta' || (!hasStats && !hasList);
      if (centered) host.classList.add('center');

      if (sc.subtitle && sc.key !== 'hook') host.appendChild(el('div', 'eyebrow', esc(sc.subtitle)));
      host.appendChild(el('div', 'title' + (sc.key === 'hook' ? ' hook' : ''), esc(sc.title)));
      if (sc.key === 'hook' && sc.subtitle) host.appendChild(el('div', 'subtitle', esc(sc.subtitle)));
      if (hasStats) host.appendChild(statGrid(sc.stats));
      if (hasList) host.appendChild(listView(sc.list));
      if (centered && sc.narration && sc.key !== 'cta') host.appendChild(el('div', 'lede', esc(sc.narration)));
      if (sc.key === 'cta') host.appendChild(el('div', 'fine', esc(DATA.disclaimer || sc.caption)));
      safe.appendChild(host);
      stage.appendChild(safe);

      if (sc.caption) {
        const sb = el('div', 'subband');
        sb.appendChild(el('span', 'cap', esc(sc.caption)));
        stage.appendChild(sb);
      }
      return stage;
    }

    function buildGallery() {
      const g = $('#gallery'); g.innerHTML = '';
      scenes.forEach((sc, i) => {
        const card = el('div', 'card');
        const frame = el('div', 'frame');
        frame.appendChild(buildStage(sc, i));
        const meta = el('div', 'meta');
        meta.appendChild(el('span', 'ix mono', String(i + 1).padStart(2, '0')));
        meta.appendChild(el('span', 'nm', esc(sc.title || sc.key)));
        const dl = el('span', 'dl', '下载');
        dl.onclick = () => downloadCard(i);
        meta.appendChild(dl);
        card.appendChild(frame);
        card.appendChild(meta);
        g.appendChild(card);
      });
    }

    async function downloadCard(i) {
      const stage = document.getElementById('stage-' + i);
      if (!stage) return;
      const canvas = await html2canvas(stage, {
        width: 1080, height: 1920, scale: 1, backgroundColor: '#05070d', useCORS: true, logging: false,
        onclone: (doc) => { const s = doc.getElementById('stage-' + i); if (s) s.style.transform = 'none'; },
      });
      const a = document.createElement('a');
      a.download = `${DATE}_${String(i + 1).padStart(2, '0')}_${scenes[i].key}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }

    async function downloadAll() {
      const busy = $('#busy'); busy.style.display = 'flex';
      try {
        for (let i = 0; i < scenes.length; i++) {
          busy.textContent = `正在生成图片… ${i + 1}/${scenes.length}`;
          await downloadCard(i);
          await sleep(300);
        }
      } finally { busy.style.display = 'none'; busy.textContent = '正在生成图片…'; }
    }

    async function boot() {
      try {
        const url = DATE ? `/api/recap/${DATE}` : '/api/recap';
        const r = await fetch(url);
        DATA = await r.json();
        if (!DATA || DATA.error || !(DATA.scenes || []).length) throw new Error('no recap');
      } catch (e) {
        $('#loading').textContent = '暂无该日复盘分镜，请先在「生成数据」生成快照后重试。';
        return;
      }
      scenes = DATA.scenes;
      $('#ttl').textContent = `${DATA.title || 'A股复盘'} · 图文`;
      $('#playLink').href = DATE ? `/recap/${DATE}` : '/recap';
      try { await document.fonts.ready; } catch (e) {}
      $('#loading').style.display = 'none';
      buildGallery();
    }

    $('#dlAll').onclick = downloadAll;
    boot();
  </script>
</body>
</html>
