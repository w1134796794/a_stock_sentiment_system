name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} << 'EOF'
            set -e
            cd "${{ secrets.ALIYUN_APP_DIR }}"
            git config --global --add safe.directory "$PWD"
            git fetch origin main
            git reset --hard origin/main
            if [ ! -d ".venv" ]; then python3 -m venv .venv; fi
            . .venv/bin/activate
            pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

            # 调试：打印 systemctl 路径和 sudo 权限
            which systemctl
            sudo -l

            sudo systemctl restart a-stock
            sudo systemctl status a-stock --no-pager
          EOF