name: Deploy to Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ALIYUN_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.ALIYUN_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh ${{ secrets.ALIYUN_USER }}@${{ secrets.ALIYUN_HOST }} << 'EOF'
            set -e
            cd "${{ secrets.ALIYUN_APP_DIR }}"

            git config --global --add safe.directory "$PWD"

            git fetch origin

            # 自动检测远程默认分支
            if git rev-parse --verify origin/main >/dev/null 2>&1; then
              BRANCH="main"
            elif git rev-parse --verify origin/master >/dev/null 2>&1; then
              BRANCH="master"
            else
              echo "Neither origin/main nor origin/master found"
              exit 1
            fi

            echo "Resetting to origin/$BRANCH"
            git reset --hard origin/$BRANCH

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            . .venv/bin/activate
            pip install -r requirements.txt

            sudo systemctl restart a-stock-web
            sudo systemctl status a-stock-web --no-pager
          EOF