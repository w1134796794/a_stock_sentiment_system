# 情绪周期引擎配置
# 情绪周期判定来源：循环相位模型（冰点 → 修复 → 发酵 → 高潮 → 退潮）。
# 各周期对应的操盘策略（仓位/允许/禁止动作）由 core/analysis/emotion_cycle_engine.py
# 的 CYCLE_STRATEGIES 提供，此处仅维护相位模型的分群口径与判定阈值。

# ============================================
# 循环相位模型（冰点 → 修复 → 发酵 → 高潮 → 退潮）
# ============================================
phase_model:
  # 分群口径：流通市值分档（单位：亿元）
  # 小票 < 100亿 ；中军 100~500亿 ；大票 > 500亿
  cohort:
    small_max_yi: 100     # 小票流通市值上限（亿）
    large_min_yi: 500     # 大票流通市值下限（亿）

  # 相位判定阈值
  thresholds:
    freeze_lu: 25         # 涨停地量线
    low_lu: 40            # 涨停偏少线
    high_lu: 90           # 涨停密集线（高潮）
    climax_board: 6       # 高潮高度线
    ferment_board: 4      # 发酵高度线
    freeze_board: 3       # 高度坍塌线（< 该值）
    prom_strong: 30.0     # 晋级率健康线(%)
    prom_weak: 12.0       # 晋级率断崖线(%)：<12 才算断崖（原 15，放宽，避免一般偏弱即判退潮）
    wr_pos: 50.0          # 赚钱效应转正线(%)
    wr_weak: 35.0         # 亏钱效应线(%)：<35 才算亏钱效应（原 40，35~40 视为"一般"不计退潮）
    broken_high: 48.0     # 炸板高位(%)：>48 才算高位分歧/退潮信号（原 40）
    broken_div: 25.0      # 顶部分歧炸板下限(%)
    ldr_high: 0.4         # 跌停/涨停高位比

  # 真·环比动量（与昨日快照对比）的最小变动幅度
  momentum:
    prom_delta: 5.0       # 晋级率环比变动阈值(百分点)
    wr_delta: 5.0         # 赚钱效应(胜率)环比变动阈值(百分点)
    ambiguous_min_score: 4  # 相位最高分低于该值视为"无主线"
