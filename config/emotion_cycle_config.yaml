# 情绪周期引擎配置
# 统一的阈值配置，方便调参优化

# ============================================
# 情绪周期阈值配置
# ============================================
cycle_thresholds:
  # 涨停家数阈值
  limit_up:
    high: 100          # 高潮期门槛
    mid_high: 80       # 上升期上限
    mid_low: 50        # 上升期下限/震荡期上限
    low: 30            # 震荡期下限/退潮期上限
    freeze: 20         # 冰点期上限

  # 连板高度阈值
  board_height:
    boom: 7            # 高潮期最低高度
    high: 6            # 上升期上限
    mid: 4             # 上升期下限/震荡期上限
    low: 3             # 震荡期下限/冰点期上限

  # 炸板率阈值 (%)
  broken_rate:
    low: 15.0          # 低炸板率（健康）
    mid: 25.0          # 中等炸板率
    high: 40.0         # 高炸板率（危险）

  # 核按钮阈值 (跌停家数)
  nuclear_button:
    low: 3             # 少量核按钮
    high: 10           # 大量核按钮

  # 昨日涨停溢价阈值 (%)
  premium:
    high: 3.0          # 高溢价
    mid: 1.0           # 中等溢价
    low: -1.0          # 负溢价

  # 连板率阈值 (%)
  continuous_rate:
    high: 30.0         # 高连板率（情绪高涨）
    mid: 20.0          # 中等连板率
    low: 10.0          # 低连板率（情绪低迷）

  # 跌停惩罚阈值 (跌停家数/涨停家数比例)
  limit_down_ratio:
    low: 0.1           # 跌停少（健康）
    mid: 0.3           # 中等跌停
    high: 0.5          # 跌停多（危险）

# ============================================
# 情绪周期评分权重配置
# ============================================
scoring_weights:
  # 各维度对周期判断的权重
  limit_up_count: 1.0      # 涨停家数权重
  board_height: 0.8        # 连板高度权重
  broken_rate: 0.6         # 炸板率权重
  nuclear_button: 0.5      # 核按钮权重
  premium: 0.5             # 昨日溢价权重
  echelon: 0.4             # 梯队完整性权重
  continuous_rate: 0.6     # 连板率权重
  limit_down_ratio: 0.7    # 跌停比例权重

# ============================================
# 梯队完整性评分配置
# ============================================
echelon_scoring:
  # 理想梯队比例递减
  ideal_ratios: [0.6, 0.4, 0.25, 0.15, 0.1]  # 2B/1B, 3B/2B, ...
  min_ratio_threshold: 0.5  # 至少达到理想值的50%

# ============================================
# 情绪周期判定规则
# ============================================
cycle_rules:
  # 判定为某个周期所需的最小得分
  min_scores:
    boom: 5
    freeze: 5
    decline: 5
    rise: 0
    shake: 0

  # 各周期基础描述
  descriptions:
    boom: "涨停>100家，连板高度>7板，无核按钮"
    rise: "涨停50-100家，连板高度4-6板，有主线"
    shake: "涨停30-60家，连板高度3-5板，轮动快"
    decline: "涨停<30家，核按钮多，高标A杀"
    freeze: "涨停<20家，连板高度<3板，地量"

# ============================================
# 周期对应策略配置
# ============================================
cycle_strategies:
  boom:
    strategy: "只卖不买，减仓龙头，准备撤退"
    position: "<30%"
    risk_level: "极高"
    allowed_actions: ["减仓", "止盈", "空仓观望"]
    forbidden_actions: ["开新仓", "追高", "打板", "接力"]

  rise:
    strategy: "重仓龙头，做最强，积极参与"
    position: "50-80%"
    risk_level: "中等"
    allowed_actions: ["打板", "接力", "做龙头", "做主线"]
    forbidden_actions: ["做杂毛", "做跟风", "随意止损"]

  shake:
    strategy: "快进快出，只做模式内，严格止损"
    position: "30-50%"
    risk_level: "中高"
    allowed_actions: ["低吸", "首板", "严格止损"]
    forbidden_actions: ["追高", "重仓", "格局", "补仓"]

  decline:
    strategy: "空仓或1成试错，禁止接力"
    position: "0-10%"
    risk_level: "高"
    allowed_actions: ["空仓", "极小仓位试错", "观察"]
    forbidden_actions: ["接力", "打板", "重仓", "抄底"]

  freeze:
    strategy: "准备新周期，试首板，等信号"
    position: "10-20%"
    risk_level: "中等"
    allowed_actions: ["试首板", "小仓位试错", "观察信号"]
    forbidden_actions: ["重仓", "接力高位", "盲目抄底"]
