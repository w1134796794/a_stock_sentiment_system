# ============================================
# Layer 3: 个股筛选 — 因子启用与权重配置
# ============================================

layer3_stock_select:

  # 子类综合权重
  composite_weights:
    trend: 0.25
    volume: 0.20
    quality: 0.30
    size: 0.10
    moneyflow: 0.15

  # ---- 趋势因子 ----
  trend:
    enabled_factors:
      - "D1_n_day_high_low"
    factor_weights:
      D1_n_day_high_low: 1.0

  # ---- 量能因子 ----
  volume:
    enabled_factors:
      - "D2_volume_price_correlation"
    factor_weights:
      D2_volume_price_correlation: 1.0

  # ---- 质量因子 ----
  quality:
    enabled_factors:
      - "D3_historical_blast_rate"
      - "D4_next_day_max_profit"
    factor_weights:
      D3_historical_blast_rate: 0.45
      D4_next_day_max_profit: 0.55

  # ---- 规模因子 ----
  size:
    enabled_factors:
      - "D5_market_cap_percentile"
    factor_weights:
      D5_market_cap_percentile: 1.0

  # ---- 资金流向因子 ----
  moneyflow:
    enabled_factors:
      - "E1_main_net_inflow_ratio"
      - "E2_institution_buy_ratio"
      - "E3_north_flow"
      - "E4_margin_change_ratio"
    factor_weights:
      E1_main_net_inflow_ratio: 0.35
      E2_institution_buy_ratio: 0.25
      E3_north_flow: 0.20
      E4_margin_change_ratio: 0.20
