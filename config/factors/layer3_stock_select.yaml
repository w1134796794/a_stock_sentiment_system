# ============================================
# Layer 3: 个股筛选 — 因子启用与权重配置
# ============================================

layer3_stock_select:

  # 子类综合权重
  composite_weights:
    trend: 0.25
    volume: 0.20
    quality: 0.30
    size: 0.10
    moneyflow: 0.15

  # ---- 趋势因子 ----
  trend:
    enabled_factors:
      - "D1_n_day_high_low"
    factor_weights:
      D1_n_day_high_low: 1.0

  # ---- 量能因子 ----
  volume:
    enabled_factors:
      - "D2_vol_price_coord"
    factor_weights:
      D2_vol_price_coord: 1.0

  # ---- 质量因子 ----
  quality:
    enabled_factors:
      - "D3_seal_strength"
      - "D4_turnover_health"
    factor_weights:
      D3_seal_strength: 0.50
      D4_turnover_health: 0.50

  # ---- 规模因子 ----
  size:
    enabled_factors:
      - "D5_ma_bull_align"
    factor_weights:
      D5_ma_bull_align: 1.0

  # ---- 资金流向因子（逐股）----
  moneyflow:
    enabled_factors:
      - "E1_main_net_ratio"
      - "E2_retail_net_ratio"
      - "E3_large_buy_ratio"
      - "E4_moneyflow_trend"
    factor_weights:
      E1_main_net_ratio: 0.35
      E2_retail_net_ratio: 0.25
      E3_large_buy_ratio: 0.20
      E4_moneyflow_trend: 0.20