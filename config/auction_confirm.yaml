# ============================================================
# 集合竞价「放量 / 缩量」判定 + 次日操作建议阈值
#
# 量比口径：竞价量比 = 集合竞价成交量(手) ÷ 昨日全天成交量(手)
#   - 两者均为「手」(1 手 = 100 股)，竞价量由 成交额÷开盘价÷100 归一得到
#   - 这是 T+1 盘前确认引擎(core/execution/auction_confirm.py)使用的唯一口径
#
# 判定优先级：低开 > 放量高开 > 温和高开 > 缩量 > 区间外观察
# 所有数值均可按需调整；引擎读取本文件，无需改代码。
# ============================================================

default:
  surge_vol_ratio: 0.030      # 竞价量比 ≥ 3% → 放量(资金抢筹)
  shrink_vol_ratio: 0.008     # 竞价量比 < 0.8% → 缩量(分歧/无承接)
  huge_vol_ratio: 0.070       # 竞价量比 ≥ 7% → 巨量(警惕一字烂板/高位出货)
  min_amount: 5000000         # 竞价额下限(元)：低于此即便量比够也按弱处理(防小盘小额骗线)
  surge_amount: 20000000      # 竞价额 ≥ 2000万 → 资金强势确认
  low_open_gap: -0.02         # 高开幅度 < -2% → 低开，放弃竞价买点转盘中确认
  huge_open_gap: 0.07         # 高开幅度 > +7% 且巨量滞涨 → 警惕高开出货

# 按情绪周期对量比阈值整体收紧/放松（退潮/冰点更挑剔，上升期更宽容）
emotion_overrides:
  高潮期: { surge_vol_ratio: 0.040, shrink_vol_ratio: 0.012, min_amount: 8000000 }
  上升期: { surge_vol_ratio: 0.025, shrink_vol_ratio: 0.007 }
  震荡期: { surge_vol_ratio: 0.030, shrink_vol_ratio: 0.008 }
  退潮期: { surge_vol_ratio: 0.035, shrink_vol_ratio: 0.010, min_amount: 6000000 }
  冰点期: { surge_vol_ratio: 0.040, shrink_vol_ratio: 0.012, min_amount: 6000000 }
